      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="36" fill="url(#g)"/>
  <!-- Microphone (left side, vertical) -->
  <rect x="35" y="56" width="35" height="63" rx="18" fill="white"/>
  <!-- Lines inside mic -->
